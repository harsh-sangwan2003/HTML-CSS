<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display</title>

    <style>
        .block{
            background-color: lightblue;
            display: inline;
        }

        .inline-1{
            background-color: lightpink;
            display: block;
        }

        .inline-2{
            background-color: lightgreen;
            height:50rem;
            width:50rem;
        }

        .inline-block{
            background-color: yellow;
            display: inline-block;
            height:10rem;
            width:10rem;
        }
    </style>
</head>

<body>
    <div class="block">I am a block level element</div>
    <span class="inline-1">I am a inline element</span>
    <span class="inline-2">I am a inline element</span>
    <div class="block">I am a block element</div>
    <span class="inline-block">I am an inline element</span>
</body>

</html>
