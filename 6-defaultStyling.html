<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Default Styling</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .box {
            height: 10rem;
            width: 10rem;
            background-color: lightblue;
        }

        .border {

            height: 10rem;
            width: 10rem;
            background-color: lightblue;
            padding: 10px;
            border: 10px solid grey;
        }
    </style>
</head>

<body>

    <div class="box"></div>
    <div class="box border"></div>

</body>

</html>
