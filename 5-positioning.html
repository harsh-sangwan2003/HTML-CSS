<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        .box {
            width: 10rem;
            height: 10rem;
        }

        .box-1 {
            background-color: lightblue;

            /* Natural Flow */
            /* No effect of tlbr */
            position: static;

        }

        .box-2 {
            background-color: lightcoral;
            /* Natural Flow */
            /* tlbr */
            /* position: relative;
            top:10rem;
            left:20rem; */
        }

        .box-3 {
            background-color: lightgreen;

            /* Not in natural Flow */
            /* tlbr */
            /* position: absolute;
            top:5rem;
            left:5rem; */
        }

        .box-4 {
            background-color: orange;

            /* Not in natural flow */
            /* tlbr */
            /* Scroll doesn't work */

            /* position:fixed;
            top:5rem;
            left:5rem; */
        }

        .sticky {

            height: 5rem;
            width: 5rem;
            background-color: lightpink;
        }
    </style>
</head>

<body>
    <div class="box box-1">
        <div class="sticky"></div>
    </div>
    <div class="box box-2"></div>
    <div class="box box-3"></div>
    <div class="box box-4"></div>
</body>

</html>
